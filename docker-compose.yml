services:
  postgres:
    image: postgres:16-alpine
    container_name: agrocore-postgres
    environment:
      POSTGRES_USER: agrocore_user
      POSTGRES_PASSWORD: agrocore_password
      POSTGRES_DB: agrocore_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 192m

  # Redis (transporte de eventos de telemetria via Streams).
  # - maxmemory + noeviction: si llega al limite, los XADD fallan (mejor que
  #   perder mensajes silenciosamente; el publisher hace XTRIM tras cada add).
  # - save "" + appendonly no: sin persistencia. Lo aceptamos porque la BD
  #   guarda el historico real; el stream es solo el bus de transporte.
  redis:
    image: redis:7-alpine
    container_name: agrocore-redis
    command:
      - redis-server
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - noeviction
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6379:6379"
    restart: unless-stopped
    mem_limit: 96m
    mem_reservation: 32m

  backend:
    build: .
    container_name: agrocore-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/agrocore_db
      - SPRING_DATASOURCE_USERNAME=agrocore_user
      - SPRING_DATASOURCE_PASSWORD=agrocore_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JAVA_TOOL_OPTIONS=-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=75
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m

volumes:
  postgres_data_v2:
