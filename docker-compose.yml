services:
  # 1. Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: agrocore-postgres
    environment:
      POSTGRES_USER: agrocore_user
      POSTGRES_PASSWORD: agrocore_password
      POSTGRES_DB: agrocore_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Apache Kafka (imagen Confluent - estandar de la industria)
  # Dos listeners:
  #   - EXTERNAL (localhost:9092) para clientes en el host (desarrollo local).
  #   - INTERNAL (kafka:29092) para clientes dentro de la red Docker (contenedor backend).
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agrocore-kafka
    ports:
      - "9092:9092"
    environment:
      # Cluster ID (base64, 22 chars) - obligatorio para KRaft en Confluent
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # KRaft (sin Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single-node config
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # 3. Backend Spring Boot (NUEVO)
  backend:
    build: .
    container_name: agrocore-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
    environment:
      # Sobrescribimos la URL para que apunte al contenedor de postgres, no a localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/agrocore_db
      - SPRING_DATASOURCE_USERNAME=agrocore_user
      - SPRING_DATASOURCE_PASSWORD=agrocore_password
      # Kafka: el backend se conecta por la red interna de Docker
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: unless-stopped

# Volúmenes
volumes:
  postgres_data_v2:
  kafka_data: