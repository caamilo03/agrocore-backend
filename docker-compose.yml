services:
  # 1. Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: agrocore-postgres
    environment:
      POSTGRES_USER: agrocore_user
      POSTGRES_PASSWORD: agrocore_password
      POSTGRES_DB: agrocore_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Apache Kafka (Imagen Oficial)
  # Dos listeners:
  #   - EXTERNAL (localhost:9092) para clientes en el host (desarrollo local).
  #   - INTERNAL (kafka:29092) para clientes dentro de la red Docker (contenedor backend).
  kafka:
    image: apache/kafka:3.7.0
    container_name: agrocore-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/tmp/kafka-logs
    restart: unless-stopped

  # 3. Backend Spring Boot (NUEVO)
  backend:
    build: .
    container_name: agrocore-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
    environment:
      # Sobrescribimos la URL para que apunte al contenedor de postgres, no a localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/agrocore_db
      - SPRING_DATASOURCE_USERNAME=agrocore_user
      - SPRING_DATASOURCE_PASSWORD=agrocore_password
      # Kafka: el backend se conecta por la red interna de Docker
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: unless-stopped

# Volúmenes
volumes:
  postgres_data_v2:
  kafka_data: