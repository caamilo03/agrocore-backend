spring:
  application:
    name: agrocore-backend

  # Base de Datos
  datasource:
    url: jdbc:postgresql://127.0.0.1:15432/agrocore_db?sslmode=disable
    username: agrocore_user
    password: agrocore_password
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate # Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis (transporte de eventos de telemetria via Streams)
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

# Configuracion AgroCore
agrocore:
  redis:
    streams:
      # Nombre del stream (incluye version; cambios incompatibles -> stream nuevo).
      telemetry: agrocore.telemetry.readings.v1
      consumer-group: agrocore-telemetry-group
      consumer-name: ${HOSTNAME:agrocore-backend}
      # MAXLEN aproximado: limita el tamano del stream en Redis para no
      # consumir RAM indefinidamente. La BD ya guarda el historico real.
      max-len: 10000
      # Timeout del poll del listener container.
      poll-timeout-ms: 1000
  simulator:
    enabled: ${AGROCORE_SIMULATOR_ENABLED:true}
    interval-ms: ${AGROCORE_SIMULATOR_INTERVAL_MS:30000}
    variance-percent: 5
  security:
    jwt:
      # Minimo 32 caracteres. En produccion usar AGROCORE_JWT_SECRET con valor aleatorio seguro.
      secret: ${AGROCORE_JWT_SECRET:dev-secret-only-not-for-production-min-256-bits-agrocore-2026}
      expiry-ms: ${AGROCORE_JWT_EXPIRY_MS:86400000}   # 24h por defecto
    # Emails que reciben rol ADMIN al hacer su primer login. Separados por coma.
    admin-emails: ${AGROCORE_ADMIN_EMAILS:}
    google:
      client-id: ${AGROCORE_GOOGLE_CLIENT_ID:}
